<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login HR Services</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    min-height:100svh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
    overflow-y:auto;
    padding:30px 15px;

    background: linear-gradient(-45deg,#dbeafe,#ecfeff,#dcfce7,#e0f2fe);
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* BUBBLE */
/* AURORA BACKGROUND */

.bg{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
}

.bg::before,
.bg::after,
.bg span{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(110px);
    opacity:.35;
}

.bg::before{
    width:650px;
    height:650px;
    background:#2563eb;
    top:-200px;
    left:-150px;
    animation:moveBlue 18s ease-in-out infinite alternate;
}

.bg::after{
    width:600px;
    height:600px;
    background:#10b981;
    bottom:-180px;
    right:-150px;
    animation:moveGreen 20s ease-in-out infinite alternate;
}

.bg span{
    width:500px;
    height:500px;
    background:#38bdf8;
    left:35%;
    top:20%;
    animation:moveCenter 22s ease-in-out infinite alternate;
}

@keyframes auroraBlue{
    0%{
        transform:translate(0,0) scale(1);
    }
    100%{
        transform:translate(180px,120px) scale(1.3);
    }
}

@keyframes auroraGreen{
    0%{
        transform:translate(0,0) scale(1);
    }
    100%{
        transform:translate(-180px,-120px) scale(1.25);
    }
}

@keyframes moveBlue{
    0%{
        transform:translate(0,0) scale(1);
    }
    100%{
        transform:translate(250px,150px) scale(1.35) rotate(40deg);
    }
}

@keyframes moveGreen{
    0%{
        transform:translate(0,0) scale(1);
    }
    100%{
        transform:translate(-250px,-150px) scale(1.4);
    }
}

@keyframes moveCenter{
    0%{
        transform:translate(-50px,-40px) scale(.9);
    }
    100%{
        transform:translate(100px,120px) scale(1.4);
    }
}

@keyframes shine{

100%{
left:170%;
}

}
    
/* CARD */
.card{
    width:100%;
    max-width:420px;
    padding:28px 22px;

    background:rgba(255,255,255,.25);
    backdrop-filter:blur(25px);

    border-radius:28px;
    border:1px solid rgba(255,255,255,.4);

    box-shadow:0 20px 60px rgba(0,0,0,.12);

    z-index:10;
    position:relative;

    margin-top:70px;
}


.card.fade-out{
    opacity:0;
    transform:scale(.95);
    transition:.5s;
}

.card{

animation:
appear .8s ease,
floating 6s ease-in-out infinite;

}

@keyframes appear{

0%{
opacity:0;
transform:translateY(50px) scale(.9);
}

100%{
opacity:1;
transform:none;
}

}

@keyframes floating{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

}
    
/* LOGO PARAGON */
.logo-box{
    position:absolute;
    top:-105px;
    left:50%;
    transform:translateX(-50%);

    width:clamp(250px, 75vw, 340px);
    height:80px;

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:20;
}

.logo-box img{
    width:100%;
    max-width:340px;
    height:auto;
    object-fit:contain;
    display:block;
}


/* LOGO GEMBOK */
.logo{
    width:80px;
    height:80px;

    display:flex;
    align-items:center;
    justify-content:center;

    margin:0 auto 18px auto;

    border-radius:22px;
    background:linear-gradient(135deg,#2563eb,#10b981);

    color:white;
    font-size:28px;
}

/* TEXT */
h1{
    text-align:center;
    font-size:clamp(22px,5vw,28px);
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:#64748b;
    font-size:clamp(13px,3vw,15px);
    margin:10px 0 20px;
}

/* INPUT */
.input-group{
    position:relative;
    margin-bottom:15px;
}

.input-group i.left{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#2563eb;
}

.eye{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#64748b;
}

.input-group input{
    width:100%;
    height:55px;
    border:none;
    outline:none;
    border-radius:14px;
    padding:0 45px;
    font-size:15px;
    background:rgba(255,255,255,.8);
}

/* BUTTON */
.login-btn{
    position:relative;
    overflow:hidden;
    isolation:isolate;

    width:100%;
    height:55px;
    border:none;
    border-radius:14px;

    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;

    background:linear-gradient(270deg,#2563eb,#10b981,#2563eb);
    background-size:300%;
    animation:btnMove 6s ease infinite;
}

.login-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;

    width:60%;
    height:100%;

    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.45),
        transparent
    );

    transform:skewX(-25deg);

    animation:shine 2.5s linear infinite;

    z-index:-1;
}
    
/* SUCCESS */
.success{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,.5);
    backdrop-filter:blur(10px);
    z-index:999;
}

.check{
    width:90px;
    height:90px;
    border-radius:50%;
    border:4px solid #10b981;
    display:flex;
    align-items:center;
    justify-content:center;
    animation:pop .4s ease;
}

.check i{
    color:#10b981;
    font-size:40px;
}

@keyframes pop{
    0%{transform:scale(0);}
    100%{transform:scale(1);}
}

</style>
</head>

<body>
    
<!-- BUBBLE -->
<div class="bg">
    <span></span>
</div>

<div class="card" id="card">
    
<div class="logo-box">
    <img src="img/paragoncorp.png" alt="Paragoncorp">
</div>

<div class="logo">
    <i class="fa-solid fa-user-lock"></i>
</div>

    <h1>LOGIN HR SERVICES</h1>
    <div class="subtitle">Masukkan username dan password</div>

    <div class="input-group">
        <i class="fa-solid fa-user left"></i>
        <input id="username" type="text" placeholder="Username">
    </div>

    <div class="input-group">
        <i class="fa-solid fa-lock left"></i>
        <input id="password" type="password" placeholder="Password">
        <i class="fa-solid fa-eye eye" onclick="togglePass()"></i>
    </div>

    <button class="login-btn" onclick="login()">LOGIN</button>

</div>

<div class="success" id="success">
    <div class="check">
        <i class="fa-solid fa-check"></i>
    </div>
</div>

<script>

document.addEventListener("keydown",(e)=>{
    if(e.key==="Enter") login();
});

function togglePass(){
    const p=document.getElementById("password");
    p.type=p.type==="password"?"text":"password";
}

async function login(){

    const u=document.getElementById("username").value.trim().toLowerCase();
    const p=document.getElementById("password").value.trim();

    try{
        const res=await fetch("./csvjson.json?nocache="+Date.now());
        const users=await res.json();

        const user=users.find(x=>
            String(x.Username).trim().toLowerCase()===u &&
            String(x.Password).trim()===p
        );

        if(user){
            document.getElementById("success").style.display="flex";
            document.getElementById("card").classList.add("fade-out");

            setTimeout(()=>{
                window.location.href="home.html";
            },900);

        }else{
            alert("Login gagal");
        }

    }catch(err){
        alert("JSON error / tidak kebaca");
        console.log(err);
    }
}

</script>

</body>
</html>
