<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login HR Services</title>

<!-- FONT BARU (lebih modern dari Poppins) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#dbeafe,#ecfeff,#dcfce7,#e0f2fe);
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
}

/* background animation */
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* BUBBLES */
.bg span{
    position:absolute;
    bottom:-150px;
    width:20px;
    height:20px;
    background:rgba(255,255,255,.25);
    border-radius:50%;
    animation:float 18s linear infinite;
    backdrop-filter:blur(5px);
}

.bg span:nth-child(1){left:10%;width:60px;height:60px;animation-duration:20s;}
.bg span:nth-child(2){left:30%;animation-duration:14s;}
.bg span:nth-child(3){left:50%;width:80px;height:80px;animation-duration:22s;}
.bg span:nth-child(4){left:70%;animation-duration:16s;}
.bg span:nth-child(5){left:85%;width:50px;height:50px;animation-duration:25s;}

@keyframes float{
    0%{transform:translateY(0);opacity:0;}
    20%{opacity:.6;}
    100%{transform:translateY(-120vh);opacity:0;}
}

/* CARD */
.card{
    width:420px;
    padding:35px;

    background:rgba(255,255,255,.25);
    backdrop-filter:blur(25px);

    border-radius:28px;
    border:1px solid rgba(255,255,255,.4);

    box-shadow:0 20px 60px rgba(0,0,0,.1);

    position:relative;
    z-index:10;
}

/* LOGO */
.logo{
    width:80px;
    height:80px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:22px;
    background:linear-gradient(135deg,#2563eb,#10b981);
    color:white;
    font-size:28px;
    margin-bottom:15px;
}

/* TEXT */
h1{
    text-align:center;
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:#64748b;
    font-size:13px;
    margin-bottom:20px;
}

/* INPUT */
.input-group{
    position:relative;
    margin-bottom:15px;
}

.input-group i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#2563eb;
}

.input-group input{
    width:100%;
    height:55px;
    border:none;
    outline:none;
    border-radius:14px;
    padding-left:45px;
    font-size:15px;
    background:rgba(255,255,255,.8);
}

/* PASSWORD EYE */
.eye{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#64748b;
}

/* BUTTON */
.login-btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:14px;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    background:linear-gradient(270deg,#2563eb,#10b981,#2563eb);
    background-size:300%;
    animation:btn 6s infinite ease;
}

@keyframes btn{
    0%{background-position:0%;}
    50%{background-position:100%;}
    100%{background-position:0%;}
}

/* SUCCESS CHECKMARK */
.success{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,.7);
    backdrop-filter:blur(10px);
    z-index:999;
}

.check{
    width:90px;
    height:90px;
    border-radius:50%;
    border:4px solid #10b981;
    display:flex;
    align-items:center;
    justify-content:center;
    animation:pop .5s ease;
}

.check i{
    color:#10b981;
    font-size:40px;
}

@keyframes pop{
    0%{transform:scale(0);}
    100%{transform:scale(1);}
}

/* FADE OUT */
.fade-out{
    opacity:0;
    transition:0.6s ease;
}

</style>
</head>

<body>

<div class="bg">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="card" id="card">

    <div class="logo"><i class="fa-solid fa-user-lock"></i></div>

    <h1>LOGIN HR</h1>
    <div class="subtitle">Masukkan username dan password</div>

    <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input id="username" type="text" placeholder="Username">
    </div>

    <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input id="password" type="password" placeholder="Password">
        <i class="fa-solid fa-eye eye" onclick="togglePass()"></i>
    </div>

    <button class="login-btn" onclick="login()">LOGIN</button>

</div>

<!-- SUCCESS -->
<div class="success" id="success">
    <div class="check">
        <i class="fa-solid fa-check"></i>
    </div>
</div>

<script>

/* ENTER LOGIN */
document.addEventListener("keydown",(e)=>{
    if(e.key==="Enter") login();
});

/* TOGGLE PASSWORD */
function togglePass(){
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

/* LOGIN */
async function login(){

    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();

    if(!u || !p) return alert("Isi semua field");

    const res = await fetch("csvjson.json");
    const users = await res.json();

    const user = users.find(x =>
        x.Username === u && x.Password === p
    );

    if(user){

        // show success animation
        document.getElementById("success").style.display="flex";

        // fade card
        document.getElementById("card").classList.add("fade-out");

        // delay redirect (smooth transition)
        setTimeout(()=>{
            window.location.href="home.html";
        },1200);

    }else{
        alert("Login gagal");
    }
}

</script>

</body>
</html>
