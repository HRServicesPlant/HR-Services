<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= GLOBAL ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;

    /* animated gradient */
    background: linear-gradient(-45deg,#dbeafe,#ecfeff,#dcfce7,#e0f2fe);
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ================= GLASS CARD ================= */
.card{
    width:420px;
    padding:35px;

    background:rgba(255,255,255,.25);
    backdrop-filter:blur(25px);

    border-radius:28px;
    border:1px solid rgba(255,255,255,.4);

    box-shadow:
        0 20px 60px rgba(0,0,0,.1),
        inset 0 0 20px rgba(255,255,255,.3);

    z-index:10;
    position:relative;
}

/* ================= LOGO ================= */
.logo{
    width:80px;
    height:80px;
    margin:auto;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:22px;

    background:linear-gradient(135deg,#2563eb,#10b981);

    color:white;
    font-size:30px;

    box-shadow:0 10px 30px rgba(0,0,0,.2);

    margin-bottom:20px;
}

/* TEXT */
h1{
    text-align:center;
    font-size:30px;
    color:#0f172a;
}

.subtitle{
    text-align:center;
    color:#64748b;
    font-size:13px;
    margin:10px 0 20px;
}

/* INPUT */
.input-group{
    position:relative;
    margin-bottom:15px;
}

.input-group i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#2563eb;
}

.input-group input{
    width:100%;
    height:55px;
    border:none;
    outline:none;
    border-radius:14px;
    padding-left:45px;
    font-size:15px;

    background:rgba(255,255,255,.8);
}

/* BUTTON */
.login-btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:14px;

    color:white;
    font-size:16px;
    font-weight:600;

    cursor:pointer;

    background:linear-gradient(270deg,#2563eb,#10b981,#2563eb);
    background-size:300%;
    animation:btnMove 6s infinite ease;
}

@keyframes btnMove{
    0%{background-position:0%;}
    50%{background-position:100%;}
    100%{background-position:0%;}
}

/* ================= NEON BUBBLES ================= */
.bg{
    position:absolute;
    inset:0;
    overflow:hidden;
    z-index:0;
}

/* bubble base */
.bg span{
    position:absolute;
    bottom:-200px;

    border-radius:50%;

    background:rgba(255,255,255,.15);
    backdrop-filter:blur(5px);

    box-shadow:
        0 0 20px rgba(59,130,246,.4),
        0 0 40px rgba(16,185,129,.3);

    animation:floatRandom linear infinite;
}

/* different sizes */
.bg span:nth-child(1){left:10%;width:60px;height:60px;animation-duration:18s;}
.bg span:nth-child(2){left:20%;width:25px;height:25px;animation-duration:12s;}
.bg span:nth-child(3){left:35%;width:80px;height:80px;animation-duration:22s;}
.bg span:nth-child(4){left:50%;width:30px;height:30px;animation-duration:16s;}
.bg span:nth-child(5){left:65%;width:55px;height:55px;animation-duration:20s;}
.bg span:nth-child(6){left:80%;width:35px;height:35px;animation-duration:14s;}

/* RANDOM MOVE (LEFT-RIGHT + UP) */
@keyframes floatRandom{
    0%{
        transform:translate(0,0) scale(1);
        opacity:0;
    }

    25%{
        transform:translate(-40px,-30vh) scale(1.2);
        opacity:.5;
    }

    50%{
        transform:translate(40px,-60vh) scale(1);
        opacity:.8;
    }

    75%{
        transform:translate(-30px,-90vh) scale(1.3);
        opacity:.4;
    }

    100%{
        transform:translate(0,-120vh) scale(1.1);
        opacity:0;
    }
}

</style>
</head>

<body>

<!-- NEON BACKGROUND -->
<div class="bg">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- CARD -->
<div class="card">

    <div class="logo">
        <i class="fa-solid fa-user-lock"></i>
    </div>

    <h1>LOGIN</h1>

    <div class="subtitle">
        Masukkan username dan password
    </div>

    <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input id="username" type="text" placeholder="Username">
    </div>

    <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input id="password" type="password" placeholder="Password">
    </div>

    <button class="login-btn" onclick="login()">
        LOGIN
    </button>

</div>

<script>

/* ENTER LOGIN */
document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        login();
    }
});

async function login(){

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!username || !password){
        alert("Isi username & password!");
        return;
    }

    try{

        const res = await fetch('csvjson.json');
        const users = await res.json();

        const user = users.find(u =>
            String(u.Username).toLowerCase().trim() === username.toLowerCase().trim()
            &&
            String(u.Password).trim() === password.trim()
        );

        if(user){

            localStorage.setItem("username", user.Username);
            window.location.href = "home.html";

        }else{
            alert("Login gagal!");
        }

    }catch(err){
        console.log(err);
        alert("Gagal load csvjson.json");
    }
}

</script>

</body>
</html>
