<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#dbeafe,#ecfeff,#dcfce7);
    position:relative;
}

/* BACKGROUND */
.blob{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:.5;
}

.blob1{
    width:420px;
    height:420px;
    background:#2563eb;
    top:-120px;
    left:-120px;
}

.blob2{
    width:350px;
    height:350px;
    background:#10b981;
    bottom:-120px;
    right:-120px;
}

.blob3{
    width:260px;
    height:260px;
    background:#38bdf8;
    top:50%;
    left:60%;
}

/* CARD */
.card{
    width:420px;
    padding:35px;

    background:rgba(255,255,255,.7);
    backdrop-filter:blur(20px);

    border-radius:28px;
    border:1px solid rgba(255,255,255,.8);

    box-shadow:0 20px 60px rgba(0,0,0,.1);

    z-index:10;
}

/* LOGO */
.logo{
    width:80px;
    height:80px;
    margin:auto;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:20px;

    background:linear-gradient(135deg,#2563eb,#10b981);

    color:white;
    font-size:30px;

    margin-bottom:20px;
}

/* TEXT */
h1{
    text-align:center;
    font-size:30px;
}

.subtitle{
    text-align:center;
    color:#64748b;
    font-size:13px;
    margin:10px 0 20px;
}

/* INPUT */
.input-group{
    position:relative;
    margin-bottom:15px;
}

.input-group i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#2563eb;
}

.input-group input{
    width:100%;
    height:55px;
    border:none;
    outline:none;
    border-radius:14px;
    padding-left:45px;
    font-size:15px;
}

/* BUTTON */
.login-btn{
    width:100%;
    height:55px;

    border:none;
    border-radius:14px;

    color:white;
    font-size:16px;
    font-weight:600;

    cursor:pointer;

    background:linear-gradient(270deg,#2563eb,#10b981,#2563eb);
    background-size:300%;
    animation:move 6s infinite ease;
}

@keyframes move{
    0%{background-position:0%;}
    50%{background-position:100%;}
    100%{background-position:0%;}
}

</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="card">

    <div class="logo">
        <i class="fa-solid fa-user-lock"></i>
    </div>

    <h1>LOGIN</h1>

    <div class="subtitle">
        Masukkan username dan password
    </div>

    <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="Username">
    </div>

    <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Password">
    </div>

    <button class="login-btn" onclick="login()">
        LOGIN
    </button>

</div>

<script>
async function login(){

    const username = document.querySelector('input[type="text"]').value.trim();
    const password = document.querySelector('input[type="password"]').value.trim();

    if(!username || !password){
        alert("Isi username & password!");
        return;
    }

    try{

        const res = await fetch('csvjson.json');
        const users = await res.json();

        const user = users.find(u =>
            String(u.Username).toLowerCase().trim() === username.toLowerCase().trim()
            &&
            String(u.Password).trim() === password.trim()
        );

        if(user){

            localStorage.setItem("username", user.Username);

            // 🔥 INI YANG PENTING (redirect ke home.html)
            window.location.href = "home.html";

        }else{
            alert("Login gagal!");
        }

    }catch(err){
        console.log(err);
        alert("Gagal membaca csvjson.json");
    }

}
</script>

</body>
</html>
