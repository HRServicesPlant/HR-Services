<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login HR Services</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background: linear-gradient(-45deg,#dbeafe,#ecfeff,#dcfce7,#e0f2fe);
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* BUBBLE */
.bg{
    position:absolute;
    inset:0;
    overflow:hidden;
    z-index:0;
}

.bg span{
    position:absolute;
    bottom:-200px;
    border-radius:50%;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(6px);
    box-shadow:0 0 25px rgba(59,130,246,.35);
    animation:float 18s linear infinite;
}

.bg span:nth-child(1){left:10%;width:60px;height:60px;animation-duration:20s;}
.bg span:nth-child(2){left:25%;width:25px;height:25px;animation-duration:14s;}
.bg span:nth-child(3){left:40%;width:80px;height:80px;animation-duration:22s;}
.bg span:nth-child(4){left:60%;width:30px;height:30px;animation-duration:16s;}
.bg span:nth-child(5){left:75%;width:55px;height:55px;animation-duration:19s;}
.bg span:nth-child(6){left:90%;width:35px;height:35px;animation-duration:15s;}

@keyframes float{
    0%{transform:translateY(0);opacity:0;}
    20%{opacity:.6;}
    100%{transform:translateY(-120vh);opacity:0;}
}

/* CARD */
.card{
    width:420px;
    padding:35px;

    background:rgba(255,255,255,.25);
    backdrop-filter:blur(25px);

    border-radius:28px;
    border:1px solid rgba(255,255,255,.4);

    box-shadow:0 20px 60px rgba(0,0,0,.12);

    z-index:10;
    position:relative;
}

.card.fade-out{
    opacity:0;
    transform:scale(.95);
    transition:.5s;
}

/* LOGO */
.logo{
    width:300px;
    height:80px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:18px;
}

.logo img{
    max-width:220px;
    max-height:70px;
    object-fit:contain;
}

/* TEXT */
h1{
    text-align:center;
    font-size:28px;
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:#64748b;
    font-size:13px;
    margin:10px 0 20px;
}

/* INPUT */
.input-group{
    position:relative;
    margin-bottom:15px;
}

.input-group i.left{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#2563eb;
}

.eye{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#64748b;
}

.input-group input{
    width:100%;
    height:55px;
    border:none;
    outline:none;
    border-radius:14px;
    padding:0 45px;
    font-size:15px;
    background:rgba(255,255,255,.8);
}

/* BUTTON */
.login-btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:14px;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;

    background:linear-gradient(270deg,#2563eb,#10b981,#2563eb);
    background-size:300%;
    animation:btnMove 6s infinite ease;
}

@keyframes btnMove{
    0%{background-position:0%;}
    50%{background-position:100%;}
    100%{background-position:0%;}
}

/* SUCCESS */
.success{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,.5);
    backdrop-filter:blur(10px);
    z-index:999;
}

.check{
    width:90px;
    height:90px;
    border-radius:50%;
    border:4px solid #10b981;
    display:flex;
    align-items:center;
    justify-content:center;
    animation:pop .4s ease;
}

.check i{
    color:#10b981;
    font-size:40px;
}

@keyframes pop{
    0%{transform:scale(0);}
    100%{transform:scale(1);}
}

</style>
</head>

<body>

<!-- BUBBLE -->
<div class="bg">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
</div>

<div class="card" id="card">

    <div class="logo">
        <img src="paragoncorp.png" alt="Paragoncorp">
    </div>

    <h1>LOGIN HR SERVICES</h1>
    <div class="subtitle">Masukkan username dan password</div>

    <div class="input-group">
        <i class="fa-solid fa-user left"></i>
        <input id="username" type="text" placeholder="Username">
    </div>

    <div class="input-group">
        <i class="fa-solid fa-lock left"></i>
        <input id="password" type="password" placeholder="Password">
        <i class="fa-solid fa-eye eye" onclick="togglePass()"></i>
    </div>

    <button class="login-btn" onclick="login()">LOGIN</button>

</div>

<div class="success" id="success">
    <div class="check">
        <i class="fa-solid fa-check"></i>
    </div>
</div>

<script>

document.addEventListener("keydown",(e)=>{
    if(e.key==="Enter") login();
});

function togglePass(){
    const p=document.getElementById("password");
    p.type=p.type==="password"?"text":"password";
}

async function login(){

    const u=document.getElementById("username").value.trim().toLowerCase();
    const p=document.getElementById("password").value.trim();

    try{
        const res=await fetch("./csvjson.json?nocache="+Date.now());
        const users=await res.json();

        const user=users.find(x=>
            String(x.Username).trim().toLowerCase()===u &&
            String(x.Password).trim()===p
        );

        if(user){
            document.getElementById("success").style.display="flex";
            document.getElementById("card").classList.add("fade-out");

            setTimeout(()=>{
                window.location.href="home.html";
            },900);

        }else{
            alert("Login gagal");
        }

    }catch(err){
        alert("JSON error / tidak kebaca");
        console.log(err);
    }
}

</script>

</body>
</html>
